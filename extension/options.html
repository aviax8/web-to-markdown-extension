<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web to Markdown - Settings</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Web to Markdown</h1>
            <p class="version">Formatting Settings</p>
        </header>

        <main>
            <!-- markdown formatting settings -->
            <section class="section">
                <h2>Markdown Output</h2>
                <p class="description">
                    Configure texts used when converting AI conversations to markdown.
                </p>

                <div class="form-group">
                    <label for="request-header-text">Request Header Text</label>
                    <textarea id="request-header-text" rows="3" class="text-input"></textarea>
                    <span class="help-text">Default: <code>"\n\n# Question\n\n"</code></span>
                </div>

                <div class="form-group">
                    <label for="request-quote-prefix">User Request Quote Prefix</label>
                    <input type="text" id="request-quote-prefix" class="text-input">
                    <span class="help-text">Default: <code>"&gt; "</code></span>
                </div>

                <div class="form-group">
                    <label for="response-header-text">AI Response Header Text</label>
                    <textarea id="response-header-text" rows="3" class="text-input"></textarea>
                    <span class="help-text">Default: <code>"\n\n## Answer\n\n"</code></span>
                </div>

                <div class="button-group">
                    <button id="save-settings" class="btn btn-primary">Save Settings</button>
                    <button id="reset-settings" class="btn btn-secondary">Reset to Default</button>
                </div>

                <div id="selector-status" class="status-message"></div>
            </section>
        </main>
    </div>

    <script type="module" src="options.js"></script>
</body>
</html>
